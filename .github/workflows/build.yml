name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore backend/
      
    - name: Build backend
      run: dotnet build backend/ --configuration Release --no-restore
      
    - name: Run unit tests
      run: dotnet test backend/tests/Zivro.UnitTests/ --configuration Release --no-build --verbosity normal
      
    - name: Run integration tests
      run: dotnet test backend/tests/Zivro.IntegrationTests/ --configuration Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    
    - name: Install dependencies
      run: npm ci
      working-directory: frontend/
      
    - name: Build frontend
      run: npm run build
      working-directory: frontend/
      
    - name: Run linter
      run: npm run lint --if-present
      working-directory: frontend/
